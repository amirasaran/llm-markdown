<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>flowdown · web example</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html, body, #root { height: 100%; }
      body {
        margin: 0;
        background: #f3f4f6;
        /* Browsers use the first font in the list that has a glyph for each
           character, so Latin text gets Inter and Persian/Arabic text gets
           Vazirmatn — no @font-face unicode-range required. */
        font-family: 'Inter', 'Vazirmatn', system-ui, -apple-system,
          BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      code, pre, kbd {
        font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo,
          Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      }
      *:focus-visible {
        outline: 2px solid #6366F1;
        outline-offset: 2px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
